<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Video Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background-color: transparent;
            /* 노션 배경색과 자연스럽게 어울리도록 투명 처리 */
            overflow: hidden;
            /* 스크롤바 방지 */
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 영역을 꽉 채우도록 설정 */
            pointer-events: none;
            /* 클릭 및 컨트롤러 조작 완벽 차단 */
        }

        /* 우클릭 및 다운로드 방지 추가 CSS */
        .video-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
        }
    </style>
</head>

<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
    <div class="video-wrapper">
        <video id="notionVideo" autoplay muted loop playsinline></video>
    </div>

    <script>
        // URL의 ?src= 또는 ?v= 파라미터로 동영상 주소를 받음
        const params = new URLSearchParams(window.location.search);
        const videoSrc = params.get('src') || params.get('v');
        const videoElement = document.getElementById('notionVideo');

        if (videoSrc) {
            videoElement.src = decodeURIComponent(videoSrc);
        } else {
            // 주소가 없을 경우 보여줄 기본 Placeholder 영상 (테스트용)
            videoElement.src = "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
        }

        // 브라우저 정책상 오디오 요소 등으로 인해 자동재생이 차단될 경우를 대비
        videoElement.addEventListener('loadeddata', () => {
            videoElement.play().catch(error => {
                console.log("자동재생이 브라우저 정책에 의해 차단되었습니다.", error);
            });
        });
    </script>
</body>

</html>
